        article {

        }

        .date {

            line-height: 160%;
            font-weight: 300;

        .last-updated-on {

        article h1,h2,h3,h4,h5,h6 {

            font-style: italic;
            color: var(--green-dark-darker);
            margin-top: .5em
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 4px
        }

        article ul,article ol {
            padding-left: 16px;
            list-style-position: outside
        }

        article li {
            font-size: 14px;
            line-height: 160%;
            color: var(--green-dark-secondary)
        }

        article li::marker {
            color: var(--green-dark-underline)
        }

        article ul {
            list-style-type: disc
        }

        article ol {
            list-style-type: decimal
        }

        hr {
            border: none;
            border-top: 1px solid rgb(var(--gray-light))

        .sr-only {
            border: 0;
            padding: 0;
            margin: 0;
            position: absolute!important;
            height: 1px;
            width: 1px;
            overflow: hidden;
            clip: rect(1px 1px 1px 1px);
