server {
    listen 80;
    server_name info.adenchik.dev;

    root /usr/share/nginx/html;
    index index.html;

    # Скрываем версию nginx
    server_tokens off;

    # Ограничиваем методы
    if ($request_method !~ ^(GET|HEAD)$ ) {
        return 405;
    }

    # Защита от доступа к скрытым файлам
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Основной location
    location / {
        try_files $uri $uri/ =404;
    }

    # GZIP
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; script-src 'self' https: 'unsafe-inline'; style-src 'self' https: 'unsafe-inline';" always;

    # Кэширование статических файлов
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        expires 30d;
        access_log off;
    }
}